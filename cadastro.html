<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Animes - Cadastro Avançado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
        if (sessionStorage.getItem("logado") !== "true") {
            alert("Acesso negado!"); window.location.href = "login.html";
        }
    </script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top border-bottom border-secondary">
        <div class="container-fluid px-4">
            <a class="navbar-brand font-monospace fw-bold text-white" href="index.html">OLD ANIMES</a>
            <div class="collapse navbar-collapse justify-content-between">
                <ul class="navbar-nav fw-semibold">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="servicos.html">Catálogo/Streaming</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cadastro.html">Novo Membro</a></li>
                    <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre a Plataforma</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <div class="form-check form-switch m-0">
                        <input class="form-check-input bg-secondary border-0 cursor-pointer" type="checkbox" id="darkModeToggle">
                        <label class="form-check-label text-light small" for="darkModeToggle"><i class="fa-solid fa-moon"></i> Theme</label>
                    </div>
                    <button class="btn btn-sm btn-outline-light fw-bold" id="btnLogout">Sair</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container my-5 max-w-form animate-fade">
        <div class="p-4 rounded-3 border border-secondary shadow-lg bg-black text-white">
            <h4 class="mb-4 font-monospace text-center"><i class="fa-solid fa-user-plus"></i> Registar Novo Membro</h4>
            
            <form id="register-form" novalidate>
                <div class="mb-3">
                    <label class="form-label small text-secondary">Nome Completo</label>
                    <input type="text" id="reg-name" class="form-control bg-transparent text-white border-secondary" required>
                    <div class="invalid-feedback">O campo Nome não pode estar vazio.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label small text-secondary">Endereço de Email</label>
                    <input type="email" id="reg-email" class="form-control bg-transparent text-white border-secondary" required>
                    <div class="invalid-feedback">Insira um endereço de e-mail válido (deve conter '@').</div>
                </div>

                <div class="mb-3">
                    <label class="form-label small text-secondary">Senha de Acesso</label>
                    <input type="password" id="reg-password" class="form-control bg-transparent text-white border-secondary" required>
                    <div class="invalid-feedback">A senha necessita de conter pelo menos 6 caracteres.</div>
                </div>

                <div class="mb-4">
                    <label class="form-label small text-secondary">Perfil de Acesso</label>
                    <select id="reg-profile" class="form-select bg-black text-white border-secondary" required>
                        <option value="">Selecione um nível...</option>
                        <option value="moderador">Moderador de Conteúdo</option>
                        <option value="editor">Editor de Sinopses</option>
                        <option value="vip">Membro VIP</option>
                    </select>
                    <div class="invalid-feedback">Selecione um perfil de acesso válido.</div>
                </div>

                <button type="submit" class="btn btn-light w-100 fw-bold py-2 mt-2">CONCLUIR REGISTO</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
